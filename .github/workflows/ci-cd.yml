name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm install

    - name: Install backend dependencies
      run: |
        cd backend
        npm install

    - name: Build backend Docker image
      run: docker build -t backend-app ./backend

    - name: Build frontend Docker image
      run: docker build -t frontend-app ./frontend
deploy:
  needs: build
  runs-on: ubuntu-latest

  steps:
  - name: Deploy to EC2
    uses: appleboy/ssh-action@v0.1.6
    with:
      host: ${{ secrets.EC2_HOST }}
      username: ${{ secrets.EC2_USER }}
      key: ${{ secrets.EC2_KEY }}
      script: |
        docker pull 231284356477.dkr.ecr.ap-south-1.amazonaws.com/backend-repo:latest
        docker pull 231284356477.dkr.ecr.ap-south-1.amazonaws.com/frontend-repo:latest

        docker stop backend-container || true
        docker stop frontend-container || true

        docker rm backend-container || true
        docker rm frontend-container || true

        docker run -d -p 5000:5000 --name backend-container 231284356477.dkr.ecr.ap-south-1.amazonaws.com/backend-repo:latest
        docker run -d -p 3000:3000 --name frontend-container 231284356477.dkr.ecr.ap-south-1.amazonaws.com/frontend-repo:latest